name: Read-only feature request
description: Suggest a small read-only improvement.
labels: [enhancement]
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: Describe the read-only Home Assistant behaviour requested.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This request does not involve trading, orders, deposits, withdrawals, pie writes, or other account mutation.
          required: true
