name: Read-only API data request
description: Request support for additional read-only Trading 212 API data.
labels: [enhancement, api]
body:
  - type: input
    id: endpoint
    attributes:
      label: Read-only endpoint or data
    validations:
      required: true
  - type: textarea
    id: use
    attributes:
      label: Home Assistant use
      description: Describe the sensor or summary value requested.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: The requested data is read-only and does not mutate a Trading 212 account.
          required: true
